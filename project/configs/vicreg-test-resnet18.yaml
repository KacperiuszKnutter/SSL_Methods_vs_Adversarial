method: vicreg
dataset: cifar10
backbone: resnet18
num_classes: 10

name: vicreg-test-resnet18

checkpoint: null
use_projector: false

backbone_args:
  zero_init_residual: true

proj_hidden_dim: 8192
proj_output_dim: 8192

sim_loss_weight: 25.0
var_loss_weight: 25.0
cov_loss_weight: 1.0
eps: 0.0001

max_epochs: 100
optimizer: sgd
lars: true
lr: 0.4
weight_decay: 0.000001
classifier_lr: 0.5
exclude_bias_n_norm_lars: true
accumulate_grad_batches: 1
extra_optimizer_args:
  momentum: 0.9

scheduler: warmup_cosine
scheduler_interval: step
min_lr: 0.002
warmup_start_lr: 0.0
warmup_epochs: 10
lr_decay_steps: null

num_large_crops: 2
num_small_crops: 0
num_crops_per_aug: [2, 0]

batch_size: 512
num_workers: 4
data_dir: ./datasets
train_dir: null
val_dir: null

gpus: "0"

report_dir: ./outputs/reports
embeddings_dir: ./outputs/embeddings
checkpoint_dir: ./outputs/checkpoints

knn_k: 20
knn_temperature: 0.1
knn_distance_fx: cosine

linear_max_iter: 1000
linear_c: 1.0