# batch_size: 256 # Zwiększ do 2048-4096 dla ImageNet (wymaga dużej pamięci VRAM)
# lr: 0.3 # Skaluj liniowo: lr * (batch_size / 256)
# crop_size: 32 # Ustaw 224 dla ImageNet / ImageNet-100
# gaussian_blur: enabled: False # Włącz (True) tylko dla obrazów o wysokiej rozdzielczości (> 64px)


method: barlow_twins
dataset: cifar10
backbone: resnet50
num_classes: 10

name: bt-final-resnet50

checkpoint: "pytorch_hub"
use_projector: false

backbone_args:
  zero_init_residual: true

proj_hidden_dim: 2048
proj_output_dim: 8192
lamb: 0.005
scale_loss:  0.1 # 0.025 previously but 0.1 for cifar

max_epochs: 1000
optimizer: lars
lars: true
lr: 0.3 # 1.6 changed for 256 batch size
weight_decay: 1e-4 #0.0000015
classifier_lr: 0.1 # 0.5 prev
exclude_bias_n_norm_lars: true
accumulate_grad_batches: 1
extra_optimizer_args:
  momentum: 0.9
  epsilon: 1e-08

scheduler: warmup_cosine
scheduler_interval: step
min_lr: 0.0
warmup_start_lr: 0.0
warmup_epochs: 10
lr_decay_steps: null

augmentations:
  view1:
    rrc:
      enabled: True
      crop_min_scale: 0.08
      crop_size: 32
    color_jitter:
      prob: 0.8
      brightness: 0.4
      contrast: 0.4
      saturation: 0.2
      hue: 0.1
    grayscale:
      prob: 0.2
    gaussian_blur:
      prob: 1.0 # View 1 ma pełny blur[cite: 11]
    solarization:
      prob: 0.0
    horizontal_flip:
      prob: 0.5
  view2:
    rrc:
      enabled: True
      crop_min_scale: 0.08
      crop_size: 32 # change to 224 for larger ds
    color_jitter:
      prob: 0.8
    gaussian_blur:
      prob: 0.1 # View 2 ma zredukowany blur[cite: 11]
    solarization:
      prob: 0.2 # View 2 ma solaryzację[cite: 11]
    horizontal_flip:
      prob: 0.5

num_large_crops: 2
num_small_crops: 0
num_crops_per_aug: [1, 1]

batch_size: 256
num_workers: 8
data_dir: ./datasets
train_dir: null
val_dir: null

gpus: "0"

# Ścieżki relatywne względem katalogu głównego
report_dir: project/models_out/reports
figures_dir: project/models_out/figures
embeddings_dir: project/models_out/embeddings
checkpoint_dir: project/models_out/checkpoints/mine

knn_k: 20
knn_temperature: 0.1
knn_distance_fx: cosine

linear_max_iter: 1000
linear_c: 1.0