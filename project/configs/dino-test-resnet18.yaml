method: dino
dataset: cifar10
backbone: resnet18
num_classes: 10

name: dino-test-resnet18

checkpoint: null
use_projector: false

backbone_args:
  zero_init_residual: true

proj_hidden_dim: 2048
proj_output_dim: 256
num_prototypes: 65536

student_temperature: 0.1
teacher_temperature: 0.04
warmup_teacher_temperature: 0.04
final_teacher_temperature: 0.07
warmup_teacher_temperature_epochs: 30

base_tau: 0.996
final_tau: 1.0
momentum_classifier: false

center_momentum: 0.9

max_epochs: 100
optimizer: adamw
lr: 0.001
weight_decay: 0.04
weight_decay_end: 0.4
classifier_lr: 0.5
accumulate_grad_batches: 1
extra_optimizer_args: {}

scheduler: warmup_cosine
scheduler_interval: step
min_lr: 0.0
warmup_start_lr: 0.0
warmup_epochs: 10
lr_decay_steps: null

num_large_crops: 2
num_small_crops: 6
num_crops_per_aug: [2, 6]

batch_size: 512
num_workers: 4
data_dir: ./datasets
train_dir: null
val_dir: null

gpus: "0"

report_dir: ./outputs/reports
embeddings_dir: ./outputs/embeddings
checkpoint_dir: ./outputs/checkpoints

knn_k: 20
knn_temperature: 0.07
knn_distance_fx: cosine

linear_max_iter: 1000
linear_c: 1.0