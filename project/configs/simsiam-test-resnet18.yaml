method: simsiam
dataset: cifar10
backbone: resnet18
num_classes: 10

name: simsiam-test-resnet18

checkpoint: null
use_projector: false

backbone_args:
  zero_init_residual: true

# MLP dla CIFAR [cite: 567, 568]
proj_hidden_dim: 2048
proj_output_dim: 2048
pred_hidden_dim: 512

max_epochs: 800 # [cite: 566]
optimizer: sgd
lr: 0.06 # Skalowanie lr * batch_size / 256 -> 0.03 * 512 / 256 [cite: 566]
weight_decay: 0.0005 # [cite: 566]
classifier_lr: 0.5
exclude_bias_n_norm_lars: false
accumulate_grad_batches: 1
extra_optimizer_args:
momentum: 0.9 # [cite: 566]

scheduler: warmup_cosine
scheduler_interval: step
min_lr: 0.0
warmup_start_lr: 0.0
warmup_epochs: 10
lr_decay_steps: null

num_large_crops: 2
num_small_crops: 0 # CIFAR nie używa blur ani małych cropów w tym badaniu [cite: 567]
num_crops_per_aug: [2, 0]

batch_size: 512 # [cite: 566]
num_workers: 4
data_dir: ./datasets
train_dir: null
val_dir: null

gpus: "0"

report_dir: ./outputs/reports
embeddings_dir: ./outputs/embeddings
checkpoint_dir: ./outputs/checkpoints

knn_k: 20
knn_temperature: 0.1
knn_distance_fx: cosine

linear_max_iter: 1000
linear_c: 1.0